title: Social Media - [Youtube]
type: logs
streams:
  - input: httpjson
    vars:
      - name: channel_id
        type: text
        title: Channel Id
        description: |
          "Youtube Channel Id"
        show_user: true
        required: true
      - name: max_results
        type: integer
        title: Max Results
        description: |
          "Number of videos fetched per request"
        show_user: true
        required: false
        default: 50
      - name: api_key
        type: password
        title: API Key
        description: |
          Access Token, e.g. "eyJhbGciO..."
        show_user: true
        required: true
      - name: http_client_timeout
        type: text
        title: HTTP Client Timeout
        multi: false
        required: false
        show_user: true
      - name: interval
        type: text
        title: Interval to query Youtube Data API
        description: Go Duration syntax (eg. 10s)
        show_user: false
        required: true
        default: 1h
      - name: tags
        type: text
        title: Tags
        multi: true
        show_user: false
        default:
          - forwarded
          - youtube-statistics
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        description: Preserves a raw copy of the original event, added to the field `event.original`
        type: bool
        multi: false
        default: true
      - name: processors
        type: yaml
        title: Processors
        multi: false
        required: false
        show_user: false
        description: >-
          Processors are used to reduce the number of fields in the exported event or to enhance the event with metadata. This executes in the agent before the logs are parsed. See [Processors](https://www.elastic.co/guide/en/beats/filebeat/current/filtering-and-enhancing-data.html) for details.
    title: Social Media - [Youtube]
    description: Collect various logs & metrics from Social Media Youtube accounts with Elastic Agent.
    template_path: youtube.yml.hbs
